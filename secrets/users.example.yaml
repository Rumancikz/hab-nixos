# Users secrets template
# Copy this file to 'users.yaml' and fill in your actual passwords
# Then encrypt it with: sops users.yaml
#
# Passwords should be hashed using: mkpasswd -m yescrypt
# Or generate with: openssl passwd -6 "your-password"

users:
  root:
    # Generate with: mkpasswd -m yescrypt
    hashed-password: "$y$j9T$EXAMPLE_HASHED_PASSWORD_HERE"
  
  zman:
    # Generate with: mkpasswd -m yescrypt
    hashed-password: "$y$j9T$EXAMPLE_HASHED_PASSWORD_HERE"
  

# Firefly-III secrets template
# Copy this file to 'firefly.yaml' and fill in your actual secrets
# Then encrypt it with: sops firefly.yaml

firefly:
  # Application key for encryption (generate with: openssl rand -base64 32)
  # Must be exactly 32 characters
  app-key: "base64-encoded-32-char-key-here"
  
  # Database password (if using MySQL/PostgreSQL)
  db-password: "your-database-password-here"
  
  # Application URL
  # app-url: "https://firefly.yourdomain.com"
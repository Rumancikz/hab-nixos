# Nextcloud secrets template
# Copy this file to 'nextcloud.yaml' and fill in your actual secrets
# Then encrypt it with: sops nextcloud.yaml

nextcloud:
  # Admin user password (plain text, not hashed)
  # This will be used during initial Nextcloud setup
  admin-password: "your-secure-admin-password-here"
  
  # Database password (if using external database)
  # db-password: "your-database-password-here"
  
  # Secret key for encryption (generate with: openssl rand -base64 32)
  # secret-key: "your-secret-key-here"
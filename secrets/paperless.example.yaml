# Paperless-ngx secrets template
# Copy this file to 'paperless.yaml' and fill in your actual secrets
# Then encrypt it with: sops paperless.yaml

paperless:
  # Admin user password (plain text)
  # Used for the initial admin account
  password: "your-secure-paperless-password-here"
  
  # Secret key for session encryption (generate with: openssl rand -hex 32)
  # secret-key: "your-secret-key-here"